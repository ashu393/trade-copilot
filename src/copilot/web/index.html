<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trade Intelligence Copilot</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #5b8cff;
    --accent-soft: rgba(91, 140, 255, 0.12);
    --green: #38b27f;
    --amber: #d99b3a;
    --red: #e5614c;
    --code-bg: #11141a;
    --radius: 12px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

  header { margin-bottom: 28px; }
  .title { font-size: 24px; font-weight: 650; letter-spacing: -0.01em; margin: 0; }
  .subtitle { color: var(--muted); font-size: 14.5px; margin: 6px 0 0; }
  .subtitle code { font-family: var(--mono); font-size: 12.5px; color: var(--accent); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 14px; }
  .chip {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 12px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
    transition: all .12s ease; line-height: 1.2;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); background: var(--accent-soft); }

  .composer { display: flex; gap: 10px; margin-top: 6px; }
  textarea#q {
    flex: 1; resize: none; min-height: 52px; max-height: 200px;
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); padding: 14px 16px; font-family: var(--sans);
    font-size: 15px; line-height: 1.5; outline: none; transition: border-color .12s ease;
  }
  textarea#q:focus { border-color: var(--accent); }
  button#ask {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 0 22px; font-size: 14.5px; font-weight: 600; cursor: pointer;
    transition: filter .12s ease; white-space: nowrap;
  }
  button#ask:hover { filter: brightness(1.08); }
  button#ask:disabled { opacity: .55; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }

  /* Answer card */
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    margin-top: 24px; overflow: hidden; animation: fade .18s ease;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .card-head {
    display: flex; align-items: center; gap: 10px; padding: 14px 18px;
    border-bottom: 1px solid var(--border); background: var(--panel-2);
  }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    padding: 4px 9px; border-radius: 6px;
  }
  .badge.sql     { background: rgba(91,140,255,.15);  color: var(--accent); }
  .badge.kb      { background: rgba(56,178,127,.15);  color: var(--green); }
  .badge.clarify { background: rgba(217,155,58,.15);  color: var(--amber); }
  .badge.refuse  { background: rgba(229,97,76,.15);   color: var(--red); }
  .badge.unknown { background: var(--panel); color: var(--muted); }
  .qtext { color: var(--muted); font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .card-body { padding: 18px; }
  .answer { font-size: 15.5px; white-space: pre-wrap; }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 8px;
  }
  pre.sql {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; overflow-x: auto; margin: 0;
    font-family: var(--mono); font-size: 13px; color: #cde3ff; line-height: 1.5;
  }
  .cites { display: flex; flex-wrap: wrap; gap: 6px; }
  .cite { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
          font-family: var(--mono); font-size: 12px; padding: 3px 8px; border-radius: 6px; }
  details.trace { margin-top: 18px; }
  details.trace summary {
    cursor: pointer; color: var(--muted); font-size: 12.5px; list-style: none;
    user-select: none;
  }
  details.trace summary::-webkit-details-marker { display: none; }
  details.trace summary::before { content: "▸ "; }
  details.trace[open] summary::before { content: "▾ "; }
  .trace-steps { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .step { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
          font-family: var(--mono); font-size: 11.5px; padding: 3px 8px; border-radius: 6px; }

  .spinner {
    display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: -2px; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--red); font-size: 14px; }
  footer { color: var(--muted); font-size: 12px; margin-top: 40px; text-align: center; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="title">Trade Intelligence Copilot</h1>
    <p class="subtitle">Text-to-SQL + RAG over a three-tier distribution dataset. Every answer shows the <code>SQL it ran</code> and the policy it cited — and declines when it shouldn't guess.</p>
  </header>

  <div class="chips" id="chips"></div>

  <div class="composer">
    <textarea id="q" placeholder="Ask about sales, reimbursements, SKUs, or trade policy…" rows="1"></textarea>
    <button id="ask">Ask</button>
  </div>
  <div class="hint">Press ⌘/Ctrl + Enter to send.</div>

  <div id="result"></div>

  <footer>
    Numbers come only from executed, guarded SQL — never invented by the model.
  </footer>
</div>

<script>
const EXAMPLES = [
  "What were gross sales (before discount) for account ACC0001?",
  "What were our West region net sales in Q4 2024?",
  "Show me our underperforming accounts.",
  "What is our projected net revenue for next quarter?",
  "What's the max discount without director sign-off?",
  "Top 5 SKUs by case volume",
];

const chipsEl = document.getElementById("chips");
const qEl = document.getElementById("q");
const askBtn = document.getElementById("ask");
const resultEl = document.getElementById("result");

EXAMPLES.forEach(text => {
  const c = document.createElement("button");
  c.className = "chip";
  c.textContent = text;
  c.onclick = () => { qEl.value = text; qEl.focus(); autosize(); };
  chipsEl.appendChild(c);
});

function autosize() {
  qEl.style.height = "auto";
  qEl.style.height = Math.min(qEl.scrollHeight, 200) + "px";
}
qEl.addEventListener("input", autosize);
qEl.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); ask(); }
});
askBtn.addEventListener("click", ask);

function esc(s) {
  return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

async function ask() {
  const question = qEl.value.trim();
  if (!question) return;
  askBtn.disabled = true;
  resultEl.innerHTML = `<div class="card"><div class="card-body"><span class="spinner"></span>Thinking…</div></div>`;
  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    render(data);
  } catch (err) {
    resultEl.innerHTML = `<div class="card"><div class="card-body error">Request failed: ${esc(err.message)}</div></div>`;
  } finally {
    askBtn.disabled = false;
  }
}

function render(d) {
  const route = (d.route || d.status || "unknown").toLowerCase();
  const badgeClass = ["sql", "kb", "clarify", "refuse"].includes(route) ? route : "unknown";
  const badgeText = (d.status || d.route || "answer").toUpperCase();

  let html = `<div class="card">`;
  html += `<div class="card-head">
    <span class="badge ${badgeClass}">${esc(badgeText)}</span>
    <span class="qtext">${esc(d.question)}</span>
  </div>`;
  html += `<div class="card-body">`;
  html += `<div class="answer">${esc(d.answer) || "<span class='error'>No answer returned.</span>"}</div>`;

  if (d.sql) {
    html += `<div class="section-label">SQL executed</div><pre class="sql">${esc(d.sql)}</pre>`;
  }
  if (d.citations && d.citations.length) {
    html += `<div class="section-label">Sources</div><div class="cites">`;
    d.citations.forEach(c => { html += `<span class="cite">${esc(c)}</span>`; });
    html += `</div>`;
  }
  if (d.trace && d.trace.length) {
    html += `<details class="trace"><summary>Agent trace (${d.trace.length} steps)</summary><div class="trace-steps">`;
    d.trace.forEach(s => { html += `<span class="step">${esc(s)}</span>`; });
    html += `</div></details>`;
  }
  html += `</div></div>`;
  resultEl.innerHTML = html;
}
</script>
</body>
</html>
